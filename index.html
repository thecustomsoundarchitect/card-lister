<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Cards">
<title>Card Lister</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
html, body { height: 100%; }
body {
  font-family: -apple-system, system-ui, sans-serif;
  background: #1a1a1a;
  color: #fff;
  display: flex;
  flex-direction: column;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  user-select: none;
  -webkit-user-select: none;
}
#header {
  background: #000;
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #333;
  gap: 8px;
}
#batch-info { font-size: 15px; }
#batch-loc { font-weight: bold; color: #4a9eff; }
#count-info { font-size: 13px; color: #888; }
#set-location {
  background: #333; color: #fff; border: none;
  padding: 8px 14px; border-radius: 6px; font-size: 14px;
}
#main {
  flex: 1; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
  overflow-y: auto;
}
#card-counter { font-size: 38px; text-align: center; margin: 8px 0 0; }
#status {
  text-align: center; font-size: 15px;
  color: #aaa; min-height: 22px;
}
#thumbs {
  display: flex; gap: 8px; justify-content: center;
  flex-wrap: wrap; min-height: 64px; padding: 4px;
}
.thumb {
  position: relative; width: 64px; height: 64px;
}
.thumb img {
  width: 100%; height: 100%; object-fit: cover;
  border-radius: 6px; border: 1px solid #333;
}
.thumb .label {
  position: absolute; bottom: 2px; left: 2px;
  background: rgba(0,0,0,0.7); color: #fff;
  font-size: 9px; padding: 1px 4px; border-radius: 3px;
}
.thumb .x {
  position: absolute; top: -6px; right: -6px;
  width: 20px; height: 20px; border-radius: 50%;
  background: #d33; color: #fff; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid #1a1a1a;
}
button.big {
  font-size: 26px; font-weight: bold;
  padding: 22px; border: none; border-radius: 12px;
  color: #fff; cursor: pointer;
}
#front-btn { background: #2563eb; }
#front-btn.done { background: #1e3a5f; opacity: 0.5; }
#back-btn { background: #7c3aed; }
#back-btn.done { background: #3a225f; opacity: 0.5; }
#extra-btn {
  background: #444; color: #fff;
  font-size: 15px; padding: 12px;
  border: none; border-radius: 8px;
}
#done-btn {
  background: #16a34a; color: #fff;
  font-size: 22px; font-weight: bold;
  padding: 20px; border: none; border-radius: 12px;
  margin-top: 6px;
}
#done-btn:disabled { background: #333; color: #666; }
#footer {
  display: flex; gap: 8px;
  padding: 12px;
  background: #000; border-top: 1px solid #333;
}
#export-btn, #reset-btn {
  flex: 1; color: #fff;
  border: none; padding: 14px;
  border-radius: 8px; font-size: 15px;
}
#export-btn { background: #d97706; }
#reset-btn { background: #333; }
#overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  display: none; align-items: center; justify-content: center;
  z-index: 100; padding: 20px;
}
#overlay.show { display: flex; }
#overlay-box {
  background: #222; border-radius: 12px;
  padding: 20px; max-width: 100%; width: 100%;
  display: flex; flex-direction: column; gap: 12px;
}
#overlay-msg { font-size: 16px; }
#overlay-url {
  background: #000; padding: 12px; border-radius: 6px;
  font-family: ui-monospace, monospace; font-size: 13px;
  word-break: break-all; user-select: text; -webkit-user-select: text;
}
#overlay-actions { display: flex; gap: 8px; }
#overlay-actions button {
  flex: 1; padding: 12px; border: none; border-radius: 8px;
  font-size: 14px; color: #fff;
}
.btn-primary { background: #2563eb; }
.btn-secondary { background: #444; }
</style>
</head>
<body>

<div id="header">
  <div>
    <div id="batch-info">Batch: <span id="batch-loc">none</span></div>
    <div id="count-info"><span id="cards-done">0</span> cards saved</div>
  </div>
  <button id="set-location">Set Location</button>
</div>

<div id="main">
  <h1 id="card-counter">Card 1</h1>
  <div id="status">Tap FRONT to start</div>
  <div id="thumbs"></div>
  <button id="front-btn" class="big">FRONT</button>
  <button id="back-btn" class="big">BACK</button>
  <button id="extra-btn">+ Add Extra Photo</button>
  <button id="done-btn" disabled>Save Card &amp; Next</button>
</div>

<div id="footer">
  <button id="export-btn">Export to URL</button>
  <button id="reset-btn">Reset</button>
</div>

<input type="file" id="file-input" accept="image/*" capture="environment" style="display:none">

<div id="overlay">
  <div id="overlay-box">
    <div id="overlay-msg"></div>
    <div id="overlay-url"></div>
    <div id="overlay-actions">
      <button class="btn-primary" id="overlay-copy">Copy</button>
      <button class="btn-secondary" id="overlay-close">Close</button>
    </div>
  </div>
</div>

<script>
const IMGBB_KEY = 'cdcdc321c7372c67b90c78ccf2b530ee';
const IMGBB_URL = 'https://api.imgbb.com/1/upload';
const JSONBIN_KEY = '$2a$10$suOYNOHFjj96MZ1lVznrMepa7/VPjNIDH3hKJ1Z7BP4Vyss.kHxve';
const JSONBIN_BIN_ID = '69ef399636566621a8f7f21b';
const JSONBIN_URL = 'https://api.jsonbin.io/v3/b/' + JSONBIN_BIN_ID;
const KEY = 'cardLister.v1';

let state = JSON.parse(localStorage.getItem(KEY) || 'null') || {
  batch: '',
  cards: [],
  current: { photos: [] }
};

function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

function render() {
  document.getElementById('card-counter').textContent = 'Card ' + (state.cards.length + 1);
  document.getElementById('batch-loc').textContent = state.batch || 'none';
  document.getElementById('cards-done').textContent = state.cards.length;

  const photos = state.current.photos;
  const haveFront = photos.some(p => p.type === 'front');
  const haveBack = photos.some(p => p.type === 'back');

  let status;
  if (!haveFront) status = 'Tap FRONT to start';
  else if (!haveBack) status = 'Tap BACK';
  else status = photos.length + ' photos. Add extras or save.';
  document.getElementById('status').textContent = status;

  const front = document.getElementById('front-btn');
  front.classList.toggle('done', haveFront);
  front.textContent = haveFront ? 'FRONT (re-shoot)' : 'FRONT';
  const back = document.getElementById('back-btn');
  back.classList.toggle('done', haveBack);
  back.textContent = haveBack ? 'BACK (re-shoot)' : 'BACK';

  document.getElementById('done-btn').disabled = !(haveFront && haveBack);

  const thumbsEl = document.getElementById('thumbs');
  thumbsEl.innerHTML = '';
  photos.forEach((p, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'thumb';
    const img = document.createElement('img');
    img.src = p.url;
    wrap.appendChild(img);
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = p.type;
    wrap.appendChild(label);
    const x = document.createElement('div');
    x.className = 'x';
    x.textContent = '×';
    x.addEventListener('click', () => {
      photos.splice(i, 1);
      save(); render();
    });
    wrap.appendChild(x);
    thumbsEl.appendChild(wrap);
  });
}

function loadImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('Could not decode image (HEIC?). Will upload original.'));
    img.src = URL.createObjectURL(file);
  });
}

function colorDist(a, b, c, ra, rb, rc) {
  return Math.abs(a-ra) + Math.abs(b-rb) + Math.abs(c-rc);
}

async function autoCropAndShrink(file) {
  let img;
  try { img = await loadImage(file); } catch (e) { return file; }

  const W = img.width, H = img.height;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);

  let data;
  try { data = ctx.getImageData(0, 0, W, H).data; } catch (e) { return file; }

  const sampleEdge = (xs, ys) => {
    let r = 0, g = 0, b = 0, n = 0;
    for (const y of ys) for (const x of xs) {
      const i = (y * W + x) * 4;
      r += data[i]; g += data[i+1]; b += data[i+2]; n++;
    }
    return [r/n, g/n, b/n];
  };
  const edgeStep = Math.max(1, Math.floor(Math.min(W, H) / 80));
  const xRange = []; for (let x = 0; x < W; x += edgeStep) xRange.push(x);
  const yRange = []; for (let y = 0; y < H; y += edgeStep) yRange.push(y);
  const top = sampleEdge(xRange, [0, edgeStep, edgeStep*2]);
  const bot = sampleEdge(xRange, [H-1, H-1-edgeStep, H-1-edgeStep*2]);
  const left = sampleEdge([0, edgeStep, edgeStep*2], yRange);
  const right = sampleEdge([W-1, W-1-edgeStep, W-1-edgeStep*2], yRange);
  const bg = [
    (top[0] + bot[0] + left[0] + right[0]) / 4,
    (top[1] + bot[1] + left[1] + right[1]) / 4,
    (top[2] + bot[2] + left[2] + right[2]) / 4
  ];

  const THRESH = 110;
  const isFg = (i) => colorDist(data[i], data[i+1], data[i+2], bg[0], bg[1], bg[2]) > THRESH;

  const step = Math.max(1, Math.floor(Math.min(W, H) / 400));
  const colCount = new Array(W).fill(0);
  const rowCount = new Array(H).fill(0);
  let total = 0;
  for (let y = 0; y < H; y += step) {
    for (let x = 0; x < W; x += step) {
      const i = (y * W + x) * 4;
      if (isFg(i)) { colCount[x]++; rowCount[y]++; total++; }
    }
  }
  if (total < 50) return file;

  const colThresh = Math.max(2, Math.floor((H / step) * 0.10));
  const rowThresh = Math.max(2, Math.floor((W / step) * 0.10));
  let minX = -1, maxX = -1, minY = -1, maxY = -1;
  for (let x = 0; x < W; x++) if (colCount[x] >= colThresh) { if (minX < 0) minX = x; maxX = x; }
  for (let y = 0; y < H; y++) if (rowCount[y] >= rowThresh) { if (minY < 0) minY = y; maxY = y; }
  if (minX < 0 || minY < 0) return file;

  const cw = maxX - minX, ch = maxY - minY;
  if (cw < W * 0.2 || ch < H * 0.2) return file;

  const pad = Math.round(Math.min(cw, ch) * 0.02);
  const cropX = Math.max(0, minX - pad);
  const cropY = Math.max(0, minY - pad);
  const cropW = Math.min(W - cropX, cw + pad * 2);
  const cropH = Math.min(H - cropY, ch + pad * 2);

  const MAX = 1600;
  const scale = Math.min(1, MAX / Math.max(cropW, cropH));
  const outW = Math.round(cropW * scale);
  const outH = Math.round(cropH * scale);

  const out = document.createElement('canvas');
  out.width = outW; out.height = outH;
  out.getContext('2d').drawImage(c, cropX, cropY, cropW, cropH, 0, 0, outW, outH);

  return new Promise((resolve) => {
    out.toBlob((blob) => {
      if (!blob) { resolve(file); return; }
      resolve(new File([blob], 'cropped.jpg', { type: 'image/jpeg' }));
    }, 'image/jpeg', 0.9);
  });
}

async function uploadImage(file) {
  const fd = new FormData();
  fd.append('image', file);
  const resp = await fetch(IMGBB_URL + '?key=' + IMGBB_KEY, { method: 'POST', body: fd });
  if (!resp.ok) throw new Error('ImgBB HTTP ' + resp.status);
  const data = await resp.json();
  if (!data.success) throw new Error('ImgBB: ' + (data.error && data.error.message ? data.error.message : 'unknown'));
  return data.data.url;
}

async function putToJsonBin(data) {
  const resp = await fetch(JSONBIN_URL, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': JSONBIN_KEY
    },
    body: JSON.stringify(data)
  });
  if (!resp.ok) {
    let msg = 'JSONBin HTTP ' + resp.status;
    try { const j = await resp.json(); if (j.message) msg += ': ' + j.message; } catch (e) {}
    throw new Error(msg);
  }
}

let pendingType = null;

function shoot(type) {
  pendingType = type;
  document.getElementById('file-input').click();
}

document.getElementById('front-btn').addEventListener('click', () => shoot('front'));
document.getElementById('back-btn').addEventListener('click', () => shoot('back'));
document.getElementById('extra-btn').addEventListener('click', () => shoot('extra'));

document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const oldStatus = document.getElementById('status').textContent;
  document.getElementById('status').textContent = 'Uploading ' + pendingType + '...';
  try {
    const url = await uploadImage(file);
    if (pendingType === 'front' || pendingType === 'back') {
      state.current.photos = state.current.photos.filter(p => p.type !== pendingType);
    }
    state.current.photos.push({ type: pendingType, url });
    save();
    render();
  } catch (err) {
    alert('Upload failed: ' + err.message);
    document.getElementById('status').textContent = oldStatus;
  }
  e.target.value = '';
});

document.getElementById('done-btn').addEventListener('click', () => {
  state.cards.push({
    id: state.cards.length + 1,
    location: state.batch,
    timestamp: new Date().toISOString(),
    photos: state.current.photos
  });
  state.current = { photos: [] };
  save();
  render();
});

document.getElementById('set-location').addEventListener('click', () => {
  const loc = prompt('Batch location (e.g. F7, 8B). Applies to every new card until you change it:', state.batch || '');
  if (loc !== null) {
    state.batch = loc.trim();
    save(); render();
  }
});

function showOverlay(msg, url) {
  document.getElementById('overlay-msg').textContent = msg;
  const urlEl = document.getElementById('overlay-url');
  const copyBtn = document.getElementById('overlay-copy');
  if (url) {
    urlEl.textContent = url;
    urlEl.style.display = '';
    copyBtn.style.display = '';
  } else {
    urlEl.style.display = 'none';
    copyBtn.style.display = 'none';
  }
  document.getElementById('overlay').classList.add('show');
}

document.getElementById('overlay-close').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
});
document.getElementById('overlay-copy').addEventListener('click', async () => {
  const url = document.getElementById('overlay-url').textContent;
  try {
    await navigator.clipboard.writeText(url);
    document.getElementById('overlay-copy').textContent = 'Copied!';
    setTimeout(() => { document.getElementById('overlay-copy').textContent = 'Copy'; }, 1500);
  } catch (err) {
    alert('Copy failed. Long-press the URL to select, then copy.');
  }
});

document.getElementById('export-btn').addEventListener('click', async () => {
  if (state.cards.length === 0) {
    alert('No cards saved yet. Save at least one card first.');
    return;
  }
  document.getElementById('status').textContent = 'Sending ' + state.cards.length + ' cards to Claude...';
  try {
    await putToJsonBin({
      exportedAt: new Date().toISOString(),
      cards: state.cards
    });
    showOverlay('Sent ' + state.cards.length + ' cards. Just tell Claude "go" on your computer.', '');
  } catch (err) {
    alert('Send failed: ' + err.message);
  }
  render();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (state.cards.length === 0 && state.current.photos.length === 0) {
    alert('Nothing to reset.');
    return;
  }
  const msg = 'Clear ' + state.cards.length + ' saved cards from this device? (Photos already on ImgBB stay safe. Export first if you want a copy.)';
  if (confirm(msg)) {
    const keepBatch = state.batch;
    state = { batch: keepBatch, cards: [], current: { photos: [] } };
    save(); render();
  }
});

render();
</script>
</body>
</html>
